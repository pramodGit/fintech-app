<div class="dashboard-container">
  <header>
    <h1>WealthWise Dashboard</h1>
    <div class="balance-card">
      <small>Total Balance</small>
      <h2>{{ totalBalance() | currency }}</h2>
    </div>
    <!-- The Chart: This fixes the NG8113 warning -->
    <div class="chart-container">
      <canvas baseChart
        [data]="chartData()"
        [options]="chartOptions"
        [type]="'doughnut'">
      </canvas>
    </div>
  </header>

  <section class="transaction-history">
    <h3>Recent Transactions</h3>
    <table>
      <thead>
        <tr>
          <th>Date</th>
          <th>Merchant</th>
          <th>Category</th>
          <th>Amount</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        @for (item of transactions(); track item.id) {
          <tr>
            <td>{{ item.date | date:'shortDate' }}</td>
            <td>{{ item.merchant }}</td>
            <td><span class="badge">{{ item.category }}</span></td>
            <td [style.color]="item.amount > 0 ? 'green' : 'red'">
              {{ item.amount | currency }}
            </td>
            <td>
              <div class="table-actions">
                <button (click)="toggleTransactionType(item)" title="Change Type" class="btn-icon">🔄</button>
                <button (click)="deleteTransaction(item.id)" title="Delete" class="btn-icon delete">🗑️</button>
              </div>
            </td>
          </tr>
        }
      </tbody>
    </table>
    <div class="actions">
      <button (click)="generateMockTransaction()" class="btn-primary">
        + Add Random Transaction
      </button>
    </div>
  </section>
</div>
